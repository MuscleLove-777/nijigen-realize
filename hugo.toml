baseURL = "https://musclelove-777.github.io/nijigen-realize/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "二次元嫁実写化計画 | コスプレAV厳選レビュー"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[services]
  [services.googleAnalytics]
    ID = "G-DLJQ2ZR81Q"

[sitemap]
  changefreq = "daily"
  priority = 0.7

[params]
googleAnalyticsID = "G-YV53HTHVY2"
  canonicalURL = true
  env = "production"
  description = "コスプレ・アニメ系AV作品を毎日厳選。二次元キャラが三次元で蘇る興奮をサンプル動画付きで"
  author = "二次元嫁実写化計画"
  images = ["https://musclelove-777.github.io/nijigen-realize/favicon.svg"]
  keywords = ["コスプレ AV おすすめ", "アニメ AV ランキング", "コスプレイヤー AV", "アニコス AV", "制服 AV", "メイド AV", "ナース AV", "コスプレ 新作"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "二次元嫁実写化計画"
    Content = "コスプレ・アニメ系AVを毎日厳選！あの二次元キャラが実写で蘇る興奮をサンプル動画でチェック！"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

  [[params.socialIcons]]
    name = "linktree"
    url = "https://linktr.ee/ILoveMyCats"

[params.assets]
  favicon = "favicon.svg"
  favicon16x16 = "favicon.svg"
  favicon32x32 = "favicon.svg"
  apple_touch_icon = "favicon.svg"
  safari_pinned_tab = "favicon.svg"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  linkFullImages = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[[menus.main]]
  name = "検索"
  url = "/search/"
  weight = 10

[[menus.main]]
  name = "カテゴリ"
  url = "/categories/"
  weight = 20

[[menus.main]]
  name = "タグ"
  url = "/tags/"
  weight = 30

[[menus.main]]
  name = "アーカイブ"
  url = "/archives/"
  weight = 40
